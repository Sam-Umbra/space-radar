name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Space Radar
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in the details below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start the Java API with '...'
        2. Start the Python service with '...'
        3. Connect a WebSocket client to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 🧩 Affected Component
      options:
        - Java API (space-radar)
        - Python ML Service (py-space-radar)
        - WebSocket communication
        - NASA data fetching
        - ML inference
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment
      description: Please provide details about your environment.
      placeholder: |
        - OS: (e.g. Ubuntu 22.04, Windows 11)
        - Java version: (e.g. 25)
        - Python version: (e.g. 3.11)
        - Maven version: (e.g. 3.9.6)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Add any other context, screenshots, or logs here.
