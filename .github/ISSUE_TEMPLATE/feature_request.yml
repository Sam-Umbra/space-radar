name: 🚀 Feature Request
description: Suggest a new feature or improvement for Space Radar
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make Space Radar better? We'd love to hear it! Fill in the details below.

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem or Motivation
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: "I find it frustrating when... / It would be useful to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 🧩 Related Component
      options:
        - Java API (space-radar)
        - Python ML Service (py-space-radar)
        - WebSocket communication
        - NASA data fetching
        - ML inference / model
        - Angular Front-end (future)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Add any other context, mockups, or references here.
